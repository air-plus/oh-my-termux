<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="windowBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#313244"/>
      <stop offset="100%" style="stop-color:#292938"/>
    </linearGradient>
    <linearGradient id="fishGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89dceb"/>
      <stop offset="100%" style="stop-color:#74c7ec"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#94e2d5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="800" height="220" rx="18" ry="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="18" ry="18" fill="url(#bg)"/>

  <!-- Subtle grid lines for terminal feel -->
  <g opacity="0.04" clip-path="url(#roundedClip)">
    <line x1="0" y1="20" x2="800" y2="20" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="40" x2="800" y2="40" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="60" x2="800" y2="60" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="140" x2="800" y2="140" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#cdd6f4" stroke-width="1"/>
  </g>

  <!-- Terminal window left panel -->
  <rect x="28" y="24" width="220" height="172" rx="12" ry="12" fill="#11111b" stroke="#313244" stroke-width="1.5"/>
  <rect x="28" y="24" width="220" height="32" rx="12" ry="12" fill="url(#windowBar)"/>
  <rect x="28" y="42" width="220" height="14" fill="url(#windowBar)"/>

  <!-- Traffic lights -->
  <circle cx="52" cy="40" r="6" fill="#f38ba8"/>
  <circle cx="72" cy="40" r="6" fill="#fab387"/>
  <circle cx="92" cy="40" r="6" fill="#a6e3a1"/>

  <!-- Terminal text lines -->
  <text x="44" y="76" font-family="'Courier New', monospace" font-size="11" fill="#6c7086">~ $</text>
  <text x="68" y="76" font-family="'Courier New', monospace" font-size="11" fill="#a6e3a1">fisher install</text>
  <text x="44" y="96" font-family="'Courier New', monospace" font-size="10" fill="#6c7086">&#x2192;</text>
  <text x="58" y="96" font-family="'Courier New', monospace" font-size="10" fill="#94e2d5">Installing plugins...</text>
  <text x="44" y="114" font-family="'Courier New', monospace" font-size="10" fill="#a6e3a1">&#x2713;</text>
  <text x="58" y="114" font-family="'Courier New', monospace" font-size="10" fill="#cdd6f4">tide</text>
  <text x="44" y="130" font-family="'Courier New', monospace" font-size="10" fill="#a6e3a1">&#x2713;</text>
  <text x="58" y="130" font-family="'Courier New', monospace" font-size="10" fill="#cdd6f4">z</text>
  <text x="44" y="146" font-family="'Courier New', monospace" font-size="10" fill="#a6e3a1">&#x2713;</text>
  <text x="58" y="146" font-family="'Courier New', monospace" font-size="10" fill="#cdd6f4">autopair</text>
  <text x="44" y="168" font-family="'Courier New', monospace" font-size="11" fill="#6c7086">~ $</text>
  <rect x="68" y="157" width="7" height="13" rx="1" fill="#cba6f7" opacity="0.9"/>

  <!-- Glow halo behind fish -->
  <circle cx="360" cy="110" r="60" fill="#89b4fa" opacity="0.05" filter="url(#softglow)"/>

  <!-- Fish body -->
  <ellipse cx="362" cy="110" rx="42" ry="26" fill="url(#fishGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Fish tail -->
  <polygon points="320,110 298,88 298,132" fill="#74c7ec" opacity="0.85"/>

  <!-- Dorsal fin -->
  <path d="M 340 86 Q 357 70 374 84" stroke="#89dceb" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Fish eye -->
  <circle cx="387" cy="104" r="7" fill="#1e1e2e"/>
  <circle cx="389" cy="102" r="3" fill="#cdd6f4"/>
  <circle cx="390" cy="101" r="1.2" fill="#ffffff"/>

  <!-- Scale hints -->
  <path d="M 357 100 Q 364 95 372 100" stroke="#a6e3a1" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 350 110 Q 358 105 366 110" stroke="#a6e3a1" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 357 120 Q 364 115 372 120" stroke="#a6e3a1" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- Sparkles -->
  <text x="412" y="72" font-size="16" fill="#f9e2af" opacity="0.9" filter="url(#glow)">&#x2726;</text>
  <text x="306" y="82" font-size="10" fill="#cba6f7" opacity="0.7">&#x2726;</text>
  <text x="402" y="152" font-size="9" fill="#89b4fa" opacity="0.6">&#x2726;</text>

  <!-- OH MY label -->
  <text x="452" y="95"
    font-family="'Courier New', Courier, monospace"
    font-size="13" font-weight="bold" letter-spacing="3"
    fill="#6c7086">OH MY</text>

  <!-- TERMUX wordmark -->
  <text x="449" y="140"
    font-family="'Courier New', Courier, monospace"
    font-size="40" font-weight="bold" letter-spacing="1"
    fill="url(#textGrad)" filter="url(#glow)">TERMUX</text>

  <!-- Tagline -->
  <text x="452" y="164"
    font-family="'Courier New', Courier, monospace"
    font-size="10" letter-spacing="2"
    fill="#585b70">mobile terminal · out of the box</text>

  <!-- Outer border -->
  <rect x="1" y="1" width="798" height="218" rx="17" ry="17" fill="none" stroke="#313244" stroke-width="1.5" opacity="0.6"/>
</svg>
